services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-observer-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: observe
      POSTGRES_PASSWORD: observe
      POSTGRES_DB: agent_observe
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observe"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agent-observer-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ingestion:
    build:
      context: .
      dockerfile: docker/Dockerfile.ingestion
    container_name: agent-observer-ingestion
    environment:
      DATABASE_URL: postgresql://observe:observe@postgres:5432/agent_observe
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
